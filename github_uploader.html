<!DOCTYPE html>
<html lang="th">
<head><meta charset="UTF-8"><title>GitHub Uploader</title>
<style>body{font-family:sans-serif;padding:20px;} #status{margin-top:20px;padding:15px;border-radius:8px;background:#f0f0f0;white-space:pre-wrap;word-break:break-all;}</style>
</head>
<body>
<h2>🚀 GitHub File Uploader</h2>
<div id="status">⏳ กำลังเริ่มต้น...</div>
<script>
(async () => {
  const log = (msg) => { document.getElementById('status').textContent = msg; console.log(msg); };
  
  const TOKEN = 'YOUR_GITHUB_TOKEN_HERE'; // ← ใส่ Personal Access Token ของคุณ
  const OWNER = 'orawan0440';
  const REPO  = 'public-datav3';
  const BRANCH = 'publishdatav3';
  const TARGET = 'index.html';
  const SOURCE = 'dashboard_ปปท_v3.html';

  try {
    log('📂 Step 1: กำลังอ่านไฟล์ ' + SOURCE + ' ...');
    const fileResp = await fetch('./' + encodeURIComponent(SOURCE));
    if (!fileResp.ok) throw new Error('ไม่สามารถอ่านไฟล์ได้: ' + fileResp.status);
    
    log('🔄 Step 2: กำลังแปลงเป็น base64 (ไฟล์ขนาดใหญ่ โปรดรอ...)');
    const buffer = await fileResp.arrayBuffer();
    const bytes = new Uint8Array(buffer);
    
    let binary = '';
    const chunkSize = 8192;
    for (let i = 0; i < bytes.length; i += chunkSize) {
      binary += String.fromCharCode(...bytes.subarray(i, Math.min(i + chunkSize, bytes.length)));
    }
    const base64Content = btoa(binary);
    log('✅ แปลง base64 สำเร็จ ขนาด: ' + (base64Content.length / 1024 / 1024).toFixed(1) + ' MB');

    log('🔍 Step 3: กำลังดึง SHA ของไฟล์เดิม...');
    const shaResp = await fetch(
      `https://api.github.com/repos/${OWNER}/${REPO}/contents/${TARGET}?ref=${BRANCH}`,
      { headers: { 'Authorization': `token ${TOKEN}`, 'Accept': 'application/vnd.github.v3+json' } }
    );
    const shaData = await shaResp.json();
    if (!shaData.sha) throw new Error('ดึง SHA ไม่ได้: ' + JSON.stringify(shaData).substring(0, 200));
    log('✅ SHA: ' + shaData.sha);

    log('📤 Step 4: กำลังอัปโหลดขึ้น GitHub...');
    const pushResp = await fetch(
      `https://api.github.com/repos/${OWNER}/${REPO}/contents/${TARGET}`,
      {
        method: 'PUT',
        headers: {
          'Authorization': `token ${TOKEN}`,
          'Accept': 'application/vnd.github.v3+json',
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          message: 'Update index.html with dashboard_ปปท_v3 via Claude',
          content: base64Content,
          sha: shaData.sha,
          branch: BRANCH
        })
      }
    );
    const result = await pushResp.json();
    if (result.commit) {
      log('🎉 SUCCESS!\nCommit: ' + result.commit.sha + '\nURL: ' + result.content.html_url);
    } else {
      log('❌ ERROR:\n' + JSON.stringify(result, null, 2).substring(0, 1000));
    }
  } catch (err) {
    log('❌ Exception: ' + err.message);
  }
})();
</script>
</body>
</html>
